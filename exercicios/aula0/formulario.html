<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Exercício 1 - Jupiterweb</title>
    <link rel="icon" type="image/png" href="logo_jupiter.png">
    <style>
        body {
            width: 1024px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        header img {
            display: block;
            margin: 0 auto 20px auto;
        }

        form {
            width: 300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
        }
    </style>
</head>

<body>

    <header>
        <img src="jupiter_d2.jpg">
    </header>

    <h1>Login</h1>
    <form>
        <label for="usp">N°USP</label>
        <input type="text" id="usp" placeholder="N°USP">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Senha">
        <input type="submit" value="Entrar">
    </form>

    <footer>
        por incrível que pareça, esse site não é o <a href="https://uspdigital.usp.br/jupiterweb/webLogin.jsp"
            target="_blank">original</a>
    </footer>

</body>

</html>
