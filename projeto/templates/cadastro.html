{% extends "layout.html" %}

{% block conteudo %}
<div>
    <h2>Cadastro de Novo Usuário</h2>
    <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Nome Completo">

        <label for="senha">Senha:</label>
        <input type="password" id="senha" placeholder="Crie uma senha">

        <button type="button" onclick="enviarUsuario()">Criar Conta</button>
    </form>
    <p>Já tem conta? <a href="/login">Faça login</a></p>
</div>

<script src="/static/js/cadastro.js"></script>
{% endblock %}
